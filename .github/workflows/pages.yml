name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        # VITE_BASE is set to "/" since the custom domain serves from the root.
        # If you deploy without a custom domain (radgh.github.io/Offline-File-Converter/),
        # change this to VITE_BASE: /Offline-File-Converter/
        run: npm run build
        env:
          VITE_BASE: /

      - name: Copy CNAME into build output
        run: |
          if [ -f CNAME ]; then cp CNAME dist/CNAME; fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
