# Apache vhost for the offline image converter.
#
# Install with:
#   sudo cp /home/radgh/claude/converter/apache-vhost.conf /etc/apache2/sites-available/converter.conf
#   sudo a2ensite converter.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Listens on :8081 and serves the Vite build output (dist/).
# During development, prefer `npm run dev` (port 5280) which has hot reload.
# This vhost is for previewing the production build.

Listen 8081
<VirtualHost *:8081>
    ServerName converter.vm
    DocumentRoot /home/radgh/claude/converter/dist

    <Directory /home/radgh/claude/converter/dist>
        Options FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA fallback not required — this is a single index.html static build.
        DirectoryIndex index.html
    </Directory>

    # Correct MIME types for modern assets
    AddType application/wasm .wasm
    AddType image/avif .avif
    AddType image/webp .webp
    AddType image/heic .heic
    AddType image/heif .heif

    ErrorLog ${APACHE_LOG_DIR}/converter-error.log
    CustomLog ${APACHE_LOG_DIR}/converter-access.log combined
</VirtualHost>
